<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5학년 수학: 우주 디펜스 - 약분과 통분 마스터</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f0518;
            --panel-bg: #1a0b2e;
            --primary-purple: #4a2a85;
            --accent-pink: #d94fd5;
            --accent-cyan: #4ffcd5;
            --accent-red: #ff3333;
            --text-light: #e0d8f0;
            --border-color: #3d206e;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100dvh; /* 모바일 주소창 고려한 높이 단위 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 10px;
            gap: 10px;
            user-select: none;
            touch-action: none; /* 브라우저 기본 스크롤/바운스 방지 */
        }

        #main-layout {
            display: flex;
            flex-direction: row; /* 기본 가로 배치 (가로 모드 탭) */
            flex: 1;
            gap: 10px;
            min-height: 0;
        }

        /* 세로 모드 또는 좁은 화면일 때 세로 배치로 변경 */
        @media (max-aspect-ratio: 1/1) or (max-width: 800px) {
            #main-layout {
                flex-direction: column;
            }
            #quiz-panel {
                flex: 0 0 40% !important; /* 문제 영역 비중 조절 */
            }
        }

        /* 게임 영역 */
        #game-container {
            flex: 1;
            position: relative;
            background: #000;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* 퀴즈 패널 */
        #quiz-panel {
            flex: 0 0 320px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        #question-text {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 800;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            line-height: 1.4;
        }

        #options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn {
            background: var(--primary-purple);
            border: 2px solid var(--border-color);
            color: white;
            padding: 18px 10px; /* 터치하기 좋게 패딩 증가 */
            border-radius: 10px;
            font-size: 1.2rem; /* 폰트 크기 증가 */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:active {
            transform: scale(0.95);
            background: var(--accent-pink);
        }

        /* UI 레이어 (전체 화면 버튼 포함) */
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .ui-btn {
            background: rgba(74, 42, 133, 0.7);
            border: 1px solid var(--accent-cyan);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            pointer-events: auto;
            font-size: 0.9rem;
        }

        /* 모바일 조작부 (태블릿 하단 좌우 배치) */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }

        .ctrl-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        #btn-skill { border-color: var(--accent-pink); color: var(--accent-pink); }

        /* 오버레이 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        .modal {
            background: var(--panel-bg); padding: 30px; border-radius: 20px;
            border: 3px solid var(--accent-pink); text-align: center; max-width: 90%;
        }

        .start-btn {
            background: var(--accent-pink); color: white; padding: 15px 40px;
            border: none; border-radius: 30px; font-size: 1.5rem; font-weight: 800; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="main-layout">
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div>
                <span id="score-ui">점수: 0</span> | 
                <span id="boss-ui">전투중</span>
            </div>
            <div style="display: flex; gap: 5px;">
                <button class="ui-btn" onclick="toggleFullscreen()">전체 화면</button>
                <button id="btn-pause" class="ui-btn" onclick="togglePause()">일시정지</button>
            </div>
        </div>
        
        <div id="mobile-controls" class="hidden">
            <div id="btn-shoot" class="ctrl-btn">발사</div>
            <div id="btn-skill" class="ctrl-btn">스킬</div>
        </div>
    </div>

    <div id="quiz-panel">
        <div class="quiz-header">
            <h3>방어막 에너지 충전</h3>
            <p>문제를 맞히면 공격력과 실드가 강화됩니다!</p>
        </div>
        <div id="question-text">문제를 불러오는 중...</div>
        <div id="options-container"></div>
    </div>
</div>

<div id="game-overlay" class="overlay">
    <div id="setup-container" class="modal">
        <h1 style="color:var(--accent-cyan); margin-bottom:10px;">우주 디펜스</h1>
        <p>5학년 수학: 약분과 통분 마스터</p>
        <input type="text" id="player-name" placeholder="이름을 입력하세요" 
               style="margin-top:20px; padding:10px; border-radius:5px; width:100%;">
        <button class="start-btn" onclick="startGame()">전투 시작</button>
    </div>

    <div id="game-over-container" class="modal hidden">
        <h1 style="color:var(--accent-red);">게임 종료</h1>
        <p id="overlay-desc" style="margin: 20px 0;"></p>
        <button class="start-btn" onclick="location.reload()">다시 도전</button>
    </div>
</div>

<script>
    // --- 1. 초기 설정 및 캔버스 최적화 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- 전체 화면 기능 ---
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                alert(`전체 화면 모드를 실행할 수 없습니다: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    // --- 게임 상태 관리 ---
    let state = {
        isPlaying: false,
        isPaused: false,
        score: 0,
        correctAnswers: 0,
        playerX: 0,
        playerY: 0,
        playerSize: 40,
        bullets: [],
        enemies: [],
        particles: [],
        lastEnemyTime: 0,
        difficulty: 1,
        startTime: 0
    };

    let playerName = "";

    // --- 퀴즈 데이터 (예시) ---
    const quizData = [
        { q: "2/4를 약분하면?", a: ["1/2", "1/3", "1/4", "2/1"], c: 0 },
        { q: "9/12를 약분하면?", a: ["3/4", "2/3", "1/2", "3/5"], c: 0 },
        { q: "1/2과 1/3을 통분하면?", a: ["3/6, 2/6", "2/6, 1/6", "4/6, 3/6", "5/6, 2/6"], c: 0 },
        { q: "15/20을 기약분수로?", a: ["3/4", "4/5", "2/3", "1/4"], c: 0 },
        { q: "3/5와 2/3 중 큰 분수는?", a: ["2/3", "3/5", "같다", "알 수 없다"], c: 0 }
    ];

    function loadQuiz() {
        const quiz = quizData[Math.floor(Math.random() * quizData.length)];
        document.getElementById('question-text').innerText = quiz.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        quiz.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i === quiz.c);
            container.appendChild(btn);
        });
    }

    function checkAnswer(isCorrect) {
        if (!state.isPlaying || state.isPaused) return;
        if (isCorrect) {
            state.score += 100;
            state.correctAnswers++;
            state.difficulty += 0.1;
            // 시각 효과 등 추가 가능
        } else {
            state.score = Math.max(0, state.score - 50);
        }
        loadQuiz();
    }

    // --- 조작 로직 (태블릿 터치 대응) ---
    let isTouching = false;
    canvas.addEventListener('touchstart', (e) => {
        isTouching = true;
        updatePlayerPos(e.touches[0]);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (isTouching) updatePlayerPos(e.touches[0]);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => isTouching = false);

    function updatePlayerPos(touch) {
        const rect = canvas.getBoundingClientRect();
        state.playerX = touch.clientX - rect.left;
        state.playerY = touch.clientY - rect.top;
    }

    // --- 게임 루프 및 시작 함수 (핵심 로직만 유지) ---
    function startGame() {
        playerName = document.getElementById('player-name').value || "용사";
        document.getElementById('game-overlay').classList.add('hidden');
        document.getElementById('mobile-controls').classList.remove('hidden');
        state.isPlaying = true;
        state.startTime = Date.now();
        state.playerX = canvas.width / 2;
        state.playerY = canvas.height - 100;
        loadQuiz();
        requestAnimationFrame(gameLoop);
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        document.getElementById('btn-pause').innerText = state.isPaused ? "계속하기" : "일시정지";
    }

    function gameLoop() {
        if (!state.isPlaying) return;
        if (!state.isPaused) {
            update();
            draw();
        }
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // 적 생성 로직
        if (Date.now() - state.lastEnemyTime > 2000 / state.difficulty) {
            state.enemies.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -50,
                speed: 2 + Math.random() * 2
            });
            state.lastEnemyTime = Date.now();
        }

        // 적 이동
        state.enemies.forEach(en => en.y += en.speed);
        
        // 점수 UI 업데이트
        document.getElementById('score-ui').innerText = `점수: ${state.score}`;
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 플레이어 (비행기)
        ctx.fillStyle = '#4ffcd5';
        ctx.beginPath();
        ctx.moveTo(state.playerX, state.playerY - 20);
        ctx.lineTo(state.playerX - 20, state.playerY + 20);
        ctx.lineTo(state.playerX + 20, state.playerY + 20);
        ctx.fill();

        // 적군
        ctx.fillStyle = '#ff3333';
        state.enemies.forEach(en => {
            ctx.fillRect(en.x - 15, en.y - 15, 30, 30);
        });
    }

    // 터치 간섭 방지 (브라우저 제스처 차단)
    document.addEventListener('touchmove', function(e) {
        if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
        }
    }, { passive: false });

</script>

</body>
</html>
